<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>縦書きエディタ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1e1e1e;
      --bg2:      #252526;
      --bg3:      #2d2d2d;
      --border:   #3c3c3c;
      --text:     #d4d4d4;
      --dim:      #858585;
      --accent:   #007acc;
      --accent2:  #1177bb;
      --warn:     #e5c07b;
      --green:    #98c379;
    }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Yu Gothic UI', 'Meiryo UI',
                   'MS UI Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar ──────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .app-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-right: 4px;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }
    .sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    .tbtn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
    }
    .tbtn:hover  { background: rgba(255,255,255,0.09); border-color: var(--border); }
    .tbtn.on     { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tbtn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Main layout ──────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ──────────────────────────────── */
    #sidebar {
      width: 230px;
      min-width: 130px;
      display: flex;
      flex-direction: column;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
    }
    #sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sidebar-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    #tree-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .tree-msg {
      padding: 14px 12px;
      font-size: 12px;
      color: var(--dim);
      line-height: 1.7;
    }

    /* tree rows */
    .ti {
      display: flex;
      align-items: center;
      padding: 3px 0;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      font-size: 13px;
      transition: background 0.1s;
    }
    .ti:hover  { background: rgba(255,255,255,0.07); }
    .ti.sel    { background: rgba(0,122,204,0.28); }
    .ti.sel:hover { background: rgba(0,122,204,0.38); }
    .ti-arrow  { flex-shrink:0; width:16px; text-align:center; font-size:9px; color:var(--dim); }
    .ti-icon   { flex-shrink:0; margin-right:5px; font-size:13px; }
    .ti-name   { flex:1; overflow:hidden; text-overflow:ellipsis; }

    /* ── Resize handle ────────────────────────── */
    #resizer {
      width: 4px;
      flex-shrink: 0;
      cursor: col-resize;
      background: transparent;
      transition: background 0.2s;
    }
    #resizer:hover, #resizer.active { background: var(--accent); }

    /* ── Editor area ──────────────────────────── */
    #ed-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    /* tabs */
    #tabs-bar {
      display: flex;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: thin;
    }
    .tab {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 12px;
      font-size: 12px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      border-top: 2px solid transparent;
      white-space: nowrap;
      color: var(--dim);
      flex-shrink: 0;
      transition: color 0.12s;
      max-width: 180px;
    }
    .tab:hover   { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active  { color: var(--text); background: var(--bg); border-top-color: var(--accent); }
    .tab-name    { overflow:hidden; text-overflow:ellipsis; flex:1; }
    .tab-dot     { color: var(--warn); margin: 0 3px; flex-shrink:0; }
    .tab-x       { flex-shrink:0; margin-left:6px; opacity:0.45; border-radius:3px; padding:1px 3px; font-size:11px; }
    .tab-x:hover { opacity:1; background:rgba(255,255,255,0.18); }

    /* editor wrapper */
    #ed-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    /* welcome screen */
    #welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--dim);
      text-align: center;
      padding: 20px;
    }
    #welcome h2    { font-size: 20px; color: var(--text); }
    #welcome p     { font-size: 13px; line-height: 1.7; }
    .wbtn {
      padding: 10px 26px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .wbtn:hover { background: var(--accent2); }

    /* ── TEXTAREA ──────────────────────────────── */
    #editor {
      position: absolute;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: inherit;
      font-size: 16px;
      line-height: 1.8;
      tab-size: 2;
      caret-color: var(--accent);
      font-family: inherit;
      /* shown / hidden via JS */
    }

    /* horizontal mode */
    #editor.hm {
      writing-mode: horizontal-tb;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px 22px;
    }

    /* vertical mode — traditional Japanese tategaki */
    #editor.vm {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      /* height is set by container; width grows with content */
      top: 16px; bottom: 16px;
      right: 16px;
      left: auto;
      height: calc(100% - 32px);
      width: max-content;
      min-width: calc(100% - 32px);
      overflow: visible;
      padding: 0 8px;
    }

    /* wrapper scroll behaviour per mode */
    #ed-wrap.hm { overflow: hidden; }
    #ed-wrap.vm { overflow-x: auto; overflow-y: hidden; }

    /* ── Status bar ───────────────────────────── */
    #status {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 3px 12px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      flex-shrink: 0;
    }
    .si { white-space: nowrap; }
    #si-file { flex:1; overflow:hidden; text-overflow:ellipsis; }

    /* ── Modal overlay ────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg3);
      border: 1px solid #555;
      border-radius: 10px;
      padding: 28px;
      width: 500px;
      max-width: 92vw;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 16px; margin-bottom: 22px; color: #fff; }
    .fg       { margin-bottom: 18px; }
    .fl       { display:block; font-size:11px; color:var(--dim); text-transform:uppercase;
                letter-spacing:0.05em; margin-bottom:6px; }
    .fr       { display:flex; align-items:center; gap:10px; }
    select, input[type="number"] {
      background: var(--bg);
      border: 1px solid #555;
      color: var(--text);
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 13px;
    }
    select:focus, input:focus { outline: 2px solid var(--accent); }
    .mf { display:flex; justify-content:flex-end; gap:10px; margin-top:24px; }
    .btn {
      padding: 7px 20px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-p { background: var(--accent); color: #fff; }
    .btn-p:hover { background: var(--accent2); }
    .btn-s { background: #444; color: var(--text); }
    .btn-s:hover { background: #555; }

    /* ── Light theme ──────────────────────────── */
    body.light {
      --bg: #ffffff; --bg2: #f0f0f0; --bg3: #e8e8e8;
      --border: #d0d0d0; --text: #1a1a1a; --dim: #606060;
    }
    body.light #editor { caret-color: #007acc; }

    /* ── Sepia theme ──────────────────────────── */
    body.sepia {
      --bg: #f5efe0; --bg2: #ede5d0; --bg3: #e2d9c5;
      --border: #c8b899; --text: #3a2a1e; --dim: #8a7060;
    }
    body.sepia #status { background: #8a6040; }

    /* Scrollbars */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }

    /* ── Whitespace overlay ───────────────────── */
    #ws-overlay {
      position: absolute;
      pointer-events: none;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
      color: var(--text);
      scrollbar-width: none;
      /* font synced via JS to match #editor exactly */
    }
    #ws-overlay::-webkit-scrollbar { display: none; }

    /* hm: fills the same space as #editor.hm */
    #ws-overlay.hm {
      writing-mode: horizontal-tb;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: auto;
      padding: 18px 22px;
    }
    /* vm: same geometry as #editor.vm */
    #ws-overlay.vm {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      overflow: visible;
      top: 16px; bottom: 16px;
      right: 16px; left: auto;
      height: calc(100% - 32px);
      width: max-content;
      min-width: calc(100% - 32px);
      padding: 0 8px;
    }

    /* ── Whitespace marker colours ────────────── */
    /* 全角スペース: underlined blue */
    .ws-zen { color: #4db6ff;
              text-decoration: underline;
              text-decoration-color: rgba(77,182,255,0.55);
              text-underline-offset: 2px; }
    /* 半角スペース: middle dot, muted */
    .ws-sp  { color: #607898; }
    /* 改行マーク ↵ */
    .ws-nl  { color: #4db6ff; }
    /* タブ → */
    .ws-tab { color: #80b8ff; }

    /* Light theme */
    body.light .ws-zen, body.light .ws-nl { color: #1a6bcc; }
    body.light .ws-zen { text-decoration-color: rgba(26,107,204,0.5); }
    body.light .ws-sp  { color: #9aabb8; }
    body.light .ws-tab { color: #4a90cc; }

    /* Sepia theme */
    body.sepia .ws-zen, body.sepia .ws-nl { color: #8a5a30; }
    body.sepia .ws-zen { text-decoration-color: rgba(138,90,48,0.5); }
    body.sepia .ws-sp  { color: #a09080; }
    body.sepia .ws-tab { color: #7a6a50; }
  </style>
</head>
<body>

<!-- ████ Toolbar ████ -->
<div id="toolbar">
  <span class="app-name">✒️ 縦書きエディタ</span>
  <div class="sep"></div>
  <button class="tbtn" id="btn-open">📂 フォルダを開く</button>
  <button class="tbtn" id="btn-new" title="新規ファイル (Ctrl+N)">📄 新規</button>
  <button class="tbtn" id="btn-save" title="上書き保存 (Ctrl+S)">💾 保存</button>
  <button class="tbtn" id="btn-saveas" title="名前を付けて保存 (Ctrl+Shift+S)">📥 名前を付けて保存</button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-vmode" title="縦書き / 横書きを切り替え">⇅ 縦書き</button>
  <button class="tbtn" id="btn-ws" title="全角スペース・改行コードを可視化 (Ctrl+G)">¶ 記号表示</button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-settings" title="設定 (Ctrl+,)">⚙ 設定</button>
</div>

<!-- ████ Main ████ -->
<div id="main">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-head">
      <span id="sidebar-title">エクスプローラー</span>
      <button class="tbtn" id="btn-refresh" title="ツリーを更新"
              style="padding:2px 8px;font-size:11px;margin-left:6px;">↻</button>
    </div>
    <div id="tree-scroll">
      <div class="tree-msg" id="tree-ph">
        フォルダを開いてください<br>
        <small style="color:#555;font-size:11px;">
          ツールバーの「📂 フォルダを開く」から<br>
          ローカルディレクトリを選択します
        </small>
      </div>
    </div>
  </div>

  <!-- ── Resize handle ── -->
  <div id="resizer"></div>

  <!-- ── Editor area ── -->
  <div id="ed-area">
    <div id="tabs-bar"></div>
    <div id="ed-wrap" class="hm">

      <!-- Whitespace overlay (toggled by ¶ 記号表示 button) -->
      <div id="ws-overlay" class="hm" style="display:none"></div>

      <!-- Welcome screen -->
      <div id="welcome">
        <div style="font-size:58px;line-height:1">✒️</div>
        <h2>縦書きエディタ</h2>
        <p>
          ローカルフォルダを開いてファイルを編集できます<br>
          縦書き・横書き切り替え、UTF-8対応
        </p>
        <button class="wbtn" id="btn-open2">📂 フォルダを開く</button>
        <p style="font-size:11px;margin-top:4px;color:#555">
          ※ Google Chrome / Microsoft Edge が必要です<br>
          （File System Access API を使用します）
        </p>
      </div>

      <!-- Editor textarea (hidden until a file is opened) -->
      <textarea id="editor" class="hm"
        style="display:none"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"></textarea>
    </div>
  </div>
</div>

<!-- ████ Status bar ████ -->
<div id="status">
  <span class="si" id="si-mode">横書き</span>
  <span class="si">UTF-8</span>
  <span class="si" id="si-eol">LF</span>
  <span class="si" id="si-pos">1行 1列</span>
  <span class="si" id="si-chars">0 文字</span>
  <span class="si" id="si-file">—</span>
</div>

<!-- ████ Settings modal ████ -->
<div class="overlay" id="cfg-overlay">
  <div class="modal">
    <h2>⚙ 設定</h2>

    <div class="fg">
      <label class="fl">改行コード（デフォルト）</label>
      <select id="s-eol">
        <option value="lf">LF（Unix / macOS）</option>
        <option value="crlf">CRLF（Windows）</option>
        <option value="cr">CR（旧 macOS）</option>
      </select>
    </div>

    <div class="fg">
      <label class="fl">フォントサイズ</label>
      <div class="fr">
        <input type="number" id="s-fsize" value="16" min="8" max="72" style="width:80px"> px
      </div>
    </div>

    <div class="fg">
      <label class="fl">行間</label>
      <div class="fr">
        <input type="number" id="s-lh" value="1.8" min="1.0" max="4.0" step="0.1" style="width:80px">
      </div>
    </div>

    <div class="fg">
      <label class="fl">フォント</label>
      <select id="s-font">
        <option value="mincho">明朝体（游明朝・MS 明朝）</option>
        <option value="gothic">ゴシック体（游ゴシック・メイリオ）</option>
        <option value="mono">等幅（MS ゴシック）</option>
      </select>
    </div>

    <div class="fg">
      <label class="fl">テーマ</label>
      <select id="s-theme">
        <option value="dark">ダーク</option>
        <option value="light">ライト</option>
        <option value="sepia">セピア</option>
      </select>
    </div>

    <div class="mf">
      <button class="btn btn-s" id="s-cancel">キャンセル</button>
      <button class="btn btn-p" id="s-apply">適用</button>
    </div>
  </div>
</div>

<!-- ████ Script ████ -->
<script>
'use strict';

// ================================================================
//  Globals
// ================================================================
const $ = id => document.getElementById(id);
const editor  = $('editor');
const tabsBar = $('tabs-bar');
const treeScroll = $('tree-scroll');
const edWrap  = $('ed-wrap');
const welcome = $('welcome');

// State
const S = {
  root:   null,        // FileSystemDirectoryHandle
  files:  [],          // FileRec[]
  active: -1,          // index into S.files
  vm:     false,       // vertical mode?
  cfg: {
    eol:        'lf',
    fontSize:   16,
    lineHeight: 1.8,
    font:       'mincho',
    theme:      'dark',
  }
};

// FileRec: { name, handle (FSAH|null), content, saved, eol, isNew }

// Whitespace / IME state
let wsVisible = false;
let composing  = false;

// ================================================================
//  File-tree
// ================================================================
async function openDir() {
  if (!('showDirectoryPicker' in window)) {
    alert('このブラウザは File System Access API に対応していません。\n' +
          'Google Chrome または Microsoft Edge をご使用ください。');
    return;
  }
  try {
    const h = await window.showDirectoryPicker({ mode: 'readwrite' });
    S.root = h;
    $('sidebar-title').textContent = h.name;
    await buildTree();
  } catch (e) {
    if (e.name !== 'AbortError')
      alert('フォルダを開けませんでした:\n' + e.message);
  }
}

async function buildTree() {
  if (!S.root) return;
  treeScroll.innerHTML = '';
  const entries = await readDir(S.root);
  for (const e of entries) treeScroll.appendChild(makeNode(e, 0));
}

async function readDir(dh) {
  const list = [];
  for await (const [name, h] of dh.entries())
    list.push({ name, h, kind: h.kind, expanded: false, loaded: false });
  list.sort((a, b) => {
    if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name, 'ja');
  });
  return list;
}

let selNode = null;

function makeNode(e, depth) {
  const wrap = document.createElement('div');
  const row  = document.createElement('div');
  row.className = 'ti';
  row.style.paddingLeft = `${8 + depth * 14}px`;

  const arrow = document.createElement('span');
  arrow.className = 'ti-arrow';
  arrow.textContent = e.kind === 'directory' ? '▶' : ' ';

  const icon = document.createElement('span');
  icon.className = 'ti-icon';
  icon.textContent = e.kind === 'directory' ? '📁' : fileIcon(e.name);

  const nameEl = document.createElement('span');
  nameEl.className = 'ti-name';
  nameEl.textContent = e.name;

  row.appendChild(arrow);
  row.appendChild(icon);
  row.appendChild(nameEl);
  wrap.appendChild(row);

  if (e.kind === 'directory') {
    const kids = document.createElement('div');
    kids.style.display = 'none';
    wrap.appendChild(kids);

    row.addEventListener('click', async () => {
      if (!e.expanded) {
        if (!e.loaded) {
          e.loaded = true;
          kids.innerHTML = `<div class="tree-msg" style="padding:2px 8px;font-size:11px">読み込み中…</div>`;
          const ch = await readDir(e.h);
          kids.innerHTML = '';
          for (const c of ch) kids.appendChild(makeNode(c, depth + 1));
        }
        e.expanded = true;
        kids.style.display = '';
        arrow.textContent = '▼';
        icon.textContent  = '📂';
      } else {
        e.expanded = false;
        kids.style.display = 'none';
        arrow.textContent = '▶';
        icon.textContent  = '📁';
      }
    });
  } else {
    row.addEventListener('click', async () => {
      if (selNode) selNode.classList.remove('sel');
      selNode = row;
      row.classList.add('sel');
      await openFileHandle(e.h, e.name);
    });
  }

  return wrap;
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ({
    txt:'📄', md:'📝', markdown:'📝',
    js:'🟨', mjs:'🟨', ts:'🔷', jsx:'⚛️', tsx:'⚛️',
    html:'🌐', htm:'🌐', css:'🎨', scss:'🎨', sass:'🎨', less:'🎨',
    json:'📋', yaml:'📋', yml:'📋', toml:'📋', xml:'📋',
    py:'🐍', rb:'💎', java:'☕', go:'🐹',
    c:'⚙️', cpp:'⚙️', h:'⚙️', rs:'🦀',
    sh:'💻', bat:'💻', ps1:'💻',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️', webp:'🖼️',
    pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', ppt:'📙', pptx:'📙',
    zip:'📦', tar:'📦', gz:'📦', '7z':'📦',
    mp3:'🎵', wav:'🎵', ogg:'🎵', mp4:'🎬', mov:'🎬',
    log:'📋', csv:'📊', tsv:'📊', sql:'🗄️',
  })[ext] || '📄';
}

// ================================================================
//  File operations
// ================================================================
async function openFileHandle(fh, name) {
  // Already open?
  const idx = S.files.findIndex(f => f.handle === fh);
  if (idx >= 0) { switchTab(idx); return; }

  try {
    const file = await fh.getFile();
    if (file.size > 10 * 1024 * 1024) {
      alert('10 MB を超えるファイルは開けません'); return;
    }
    const raw  = await file.text();
    // Binary guard
    if (/[\x00-\x08\x0b\x0c\x0e-\x1f]/.test(raw.slice(0, 2000))) {
      alert(`"${name}" はバイナリファイルのため開けません`); return;
    }
    const eol     = detectEol(raw);
    const content = normalize(raw);
    S.files.push({ name, handle: fh, content, saved: content, eol, isNew: false });
    renderTabs();
    switchTab(S.files.length - 1);
  } catch (e) {
    alert('ファイルを開けませんでした:\n' + e.message);
  }
}

function newFile() {
  const name = `新規_${Date.now()}.txt`;
  S.files.push({ name, handle: null, content: '', saved: null, eol: S.cfg.eol, isNew: true });
  renderTabs();
  switchTab(S.files.length - 1);
}

async function saveFile(idx = S.active, saveAs = false) {
  if (idx < 0 || idx >= S.files.length) return;
  const f = S.files[idx];
  if (idx === S.active) f.content = editor.value;  // sync

  let handle = f.handle;
  if (!handle || saveAs) {
    if (!('showSaveFilePicker' in window)) {
      alert('このブラウザは保存ダイアログに対応していません'); return;
    }
    try {
      handle = await window.showSaveFilePicker({
        suggestedName: f.name,
        types: [
          { description: 'テキストファイル', accept: { 'text/plain': ['.txt','.md','.text'] } },
          { description: 'すべてのファイル', accept: { '*/*': ['.*'] } },
        ]
      });
      f.handle = handle;
      f.name   = handle.name;
      f.isNew  = false;
    } catch (e) {
      if (e.name !== 'AbortError') alert('保存エラー:\n' + e.message);
      return;
    }
  }

  // Apply line endings
  let out = f.content;
  if (f.eol === 'crlf') out = out.replace(/\n/g, '\r\n');
  else if (f.eol === 'cr') out = out.replace(/\n/g, '\r');

  try {
    const w = await handle.createWritable();
    await w.write(new TextEncoder().encode(out));
    await w.close();
    f.saved = f.content;
    renderTabs();
    if (idx === S.active) {
      $('si-file').textContent = f.name;
      $('si-eol').textContent  = f.eol.toUpperCase();
    }
    flashSave();
  } catch (e) {
    alert('保存に失敗しました:\n' + e.message);
  }
}

function closeTab(idx) {
  const f = S.files[idx];
  if (f.content !== f.saved && !confirm(`"${f.name}" の変更を破棄して閉じますか？`)) return;
  S.files.splice(idx, 1);
  const next = S.files.length === 0 ? -1 : Math.min(idx, S.files.length - 1);
  S.active = -1;
  renderTabs();
  switchTab(next);
}

function renderTabs() {
  tabsBar.innerHTML = '';
  S.files.forEach((f, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === S.active ? ' active' : '');

    const nm = document.createElement('span');
    nm.className = 'tab-name';
    nm.textContent = f.name;
    nm.title = f.name;

    const dot = document.createElement('span');
    dot.className = 'tab-dot';
    dot.textContent = (f.content !== f.saved) ? '●' : '';

    const xb = document.createElement('span');
    xb.className = 'tab-x';
    xb.textContent = '✕';
    xb.title = '閉じる';
    xb.addEventListener('click', ev => { ev.stopPropagation(); closeTab(i); });

    tab.appendChild(nm);
    tab.appendChild(dot);
    tab.appendChild(xb);
    tab.addEventListener('click', () => switchTab(i));
    tabsBar.appendChild(tab);
  });
}

function switchTab(idx) {
  // Save active editor content
  if (S.active >= 0 && S.active < S.files.length)
    S.files[S.active].content = editor.value;

  S.active = idx;

  if (idx >= 0 && idx < S.files.length) {
    const f = S.files[idx];
    editor.value = f.content;
    editor.style.display = '';
    welcome.style.display = 'none';
    $('si-file').textContent = f.name;
    $('si-eol').textContent  = f.eol.toUpperCase();
    updateStatus();
    renderTabs();
    updateOverlay();   // refresh overlay for the newly shown file
    editor.focus();
  } else {
    editor.style.display = 'none';
    welcome.style.display = '';
    $('si-file').textContent = '—';
    if (wsVisible) $('ws-overlay').innerHTML = '';
  }
}

// ================================================================
//  Writing mode
// ================================================================
function setVMode(on) {
  S.vm = on;
  const cur = on ? 'vm' : 'hm';
  const prv = on ? 'hm' : 'vm';
  editor.classList.replace(prv, cur);
  edWrap.classList.replace(prv, cur);
  $('btn-vmode').textContent = on ? '↔ 横書き' : '⇅ 縦書き';
  $('btn-vmode').classList.toggle('on', on);
  $('si-mode').textContent = on ? '縦書き' : '横書き';
  // Keep overlay in sync with new writing mode
  syncOverlayClass();
  updateOverlay();
}

// ================================================================
//  Settings
// ================================================================
function openCfg() {
  const c = S.cfg;
  $('s-eol').value   = c.eol;
  $('s-fsize').value = c.fontSize;
  $('s-lh').value    = c.lineHeight;
  $('s-font').value  = c.font;
  $('s-theme').value = c.theme;
  $('cfg-overlay').classList.add('open');
}

function applyCfg() {
  S.cfg.eol        = $('s-eol').value;
  S.cfg.fontSize   = +$('s-fsize').value;
  S.cfg.lineHeight = +$('s-lh').value;
  S.cfg.font       = $('s-font').value;
  S.cfg.theme      = $('s-theme').value;
  applyTheme();
  saveCfg();
  $('cfg-overlay').classList.remove('open');
  $('si-eol').textContent = S.cfg.eol.toUpperCase();
}

const FONTS = {
  mincho: "'Hiragino Mincho Pro','Yu Mincho','YuMincho','MS Mincho','MS 明朝',Georgia,serif",
  gothic: "'Hiragino Kaku Gothic Pro','Yu Gothic','YuGothic','Meiryo','MS PGothic',sans-serif",
  mono:   "'Hiragino Kaku Gothic Pro','Yu Gothic','MS Gothic','MS ゴシック','Courier New',monospace",
};

function applyTheme() {
  const c = S.cfg;
  editor.style.fontSize   = c.fontSize + 'px';
  editor.style.lineHeight = c.lineHeight;
  editor.style.fontFamily = FONTS[c.font];
  document.body.className = c.theme === 'dark' ? '' : c.theme;
  syncOverlayFont();   // keep overlay font in sync
}

function saveCfg() {
  try { localStorage.setItem('tgk_cfg', JSON.stringify(S.cfg)); } catch {}
}

function loadCfg() {
  try {
    const s = localStorage.getItem('tgk_cfg');
    if (s) Object.assign(S.cfg, JSON.parse(s));
  } catch {}
  applyTheme();
}

// ================================================================
//  Whitespace overlay
// ================================================================
function toggleWs() {
  wsVisible = !wsVisible;
  const ov = $('ws-overlay');
  if (wsVisible) {
    ov.style.display = '';
    syncOverlayClass();
    syncOverlayFont();
    updateOverlay();
    // Hide textarea text so only the overlay text shows.
    // Keep caret-color so cursor stays visible.
    // During IME composition the color is temporarily restored.
    if (!composing) editor.style.color = 'transparent';
  } else {
    ov.style.display = 'none';
    editor.style.color = '';   // restore to CSS inherited value
  }
  $('btn-ws').classList.toggle('on', wsVisible);
}

function updateOverlay() {
  if (!wsVisible) return;
  const ov   = $('ws-overlay');
  const text = editor.value;
  let html   = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    switch (ch) {
      case '\u3000': // 全角スペース → underlined blue space
        html += '<span class="ws-zen">\u3000</span>'; break;
      case ' ':      // 半角スペース → middle dot
        html += '<span class="ws-sp">\u00B7</span>'; break;
      case '\t':     // タブ → right arrow + tab
        html += '<span class="ws-tab">\u2192</span>\t'; break;
      case '\n':     // 改行 → return symbol then actual newline
        html += '<span class="ws-nl">\u21B5</span>\n'; break;
      case '&': html += '&amp;'; break;
      case '<': html += '&lt;';  break;
      case '>': html += '&gt;';  break;
      default:  html += ch;
    }
  }
  ov.innerHTML = html;
  syncOverlayScroll();
}

// Sync overlay scroll position to the textarea (hm mode only;
// in vm mode both are absolutely positioned inside ed-wrap which
// handles the horizontal scroll, so they move together naturally).
function syncOverlayScroll() {
  if (!wsVisible || S.vm) return;
  const ov = $('ws-overlay');
  ov.scrollTop  = editor.scrollTop;
  ov.scrollLeft = editor.scrollLeft;
}

// Apply the same hm/vm class to the overlay as the editor.
function syncOverlayClass() {
  const ov = $('ws-overlay');
  ov.classList.toggle('hm', !S.vm);
  ov.classList.toggle('vm',  S.vm);
}

// Copy font metrics from the editor so text positions match exactly.
function syncOverlayFont() {
  if (!wsVisible) return;
  const ov = $('ws-overlay');
  ov.style.fontSize   = editor.style.fontSize   || '16px';
  ov.style.lineHeight = editor.style.lineHeight || '1.8';
  ov.style.fontFamily = editor.style.fontFamily || 'inherit';
}

// ================================================================
//  Cursor movement (Ctrl+H/J/K/L  ←↓↑→)
// ================================================================
function moveCursor(dir) {
  const pos  = editor.selectionStart;
  const text = editor.value;
  let newPos = pos;

  if (dir === 'left') {
    newPos = Math.max(0, pos - 1);
  } else if (dir === 'right') {
    newPos = Math.min(text.length, pos + 1);
  } else {
    // Up / Down: determine current line index and column
    const lines = text.split('\n');
    let lineIdx = 0, lineStart = 0;
    for (let i = 0; i < lines.length; i++) {
      const lineEnd = lineStart + lines[i].length;
      if (pos >= lineStart && pos <= lineEnd) { lineIdx = i; break; }
      lineStart += lines[i].length + 1; // +1 for the \n
    }
    const col = pos - lineStart;

    if (dir === 'up' && lineIdx > 0) {
      // Find start of previous line
      let prevStart = 0;
      for (let i = 0; i < lineIdx - 1; i++) prevStart += lines[i].length + 1;
      newPos = prevStart + Math.min(col, lines[lineIdx - 1].length);
    } else if (dir === 'down' && lineIdx < lines.length - 1) {
      // Find start of next line
      let nextStart = 0;
      for (let i = 0; i <= lineIdx; i++) nextStart += lines[i].length + 1;
      newPos = nextStart + Math.min(col, lines[lineIdx + 1].length);
    }
    // else: already at first/last line — no movement
  }

  editor.selectionStart = editor.selectionEnd = newPos;
  editor.focus();
  updateStatus();
}

// ================================================================
//  Helpers
// ================================================================
function detectEol(t) {
  if (t.includes('\r\n')) return 'crlf';
  if (t.includes('\r'))   return 'cr';
  return 'lf';
}
function normalize(t) {
  return t.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
}
function updateStatus() {
  const val  = editor.value;
  const pos  = editor.selectionStart;
  const lines = val.split('\n');
  let ln = 1, col = 1, sum = 0;
  for (const line of lines) {
    if (sum + line.length >= pos) { col = pos - sum + 1; break; }
    sum += line.length + 1;
    ln++;
  }
  $('si-pos').textContent   = `${ln}行 ${col}列`;
  $('si-chars').textContent = val.length + ' 文字';
}
function flashSave() {
  const b = $('btn-save');
  const t = b.textContent;
  b.textContent = '✅ 保存完了';
  b.classList.add('on');
  setTimeout(() => { b.textContent = t; b.classList.remove('on'); }, 1600);
}

// ================================================================
//  Sidebar resize
// ================================================================
const rz  = $('resizer');
const sb  = $('sidebar');
let rzing = false;

rz.addEventListener('mousedown', () => {
  rzing = true;
  rz.classList.add('active');
  document.body.style.cursor     = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!rzing) return;
  const w = Math.max(130, Math.min(500, e.clientX));
  sb.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  if (!rzing) return;
  rzing = false;
  rz.classList.remove('active');
  document.body.style.cursor     = '';
  document.body.style.userSelect = '';
});

// ================================================================
//  Editor events
// ================================================================
editor.addEventListener('input', () => {
  if (S.active >= 0) {
    S.files[S.active].content = editor.value;
    renderTabs();
    updateStatus();
  }
  updateOverlay();   // keep overlay in sync
});

// Sync overlay scroll when the textarea scrolls (hm mode)
editor.addEventListener('scroll', syncOverlayScroll);

// IME composition: temporarily show textarea text during input
// so the candidate window and underline are visible.
editor.addEventListener('compositionstart', () => {
  composing = true;
  if (wsVisible) editor.style.color = ''; // restore while composing
});
editor.addEventListener('compositionend', () => {
  composing = false;
  if (wsVisible) {
    editor.style.color = 'transparent'; // hide again
    updateOverlay();
  }
});

editor.addEventListener('keyup',  updateStatus);
editor.addEventListener('click',  updateStatus);
editor.addEventListener('focus',  updateStatus);
editor.addEventListener('select', updateStatus);

// Tab key
editor.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const s = editor.selectionStart, en = editor.selectionEnd;
  editor.value = editor.value.slice(0, s) + '\t' + editor.value.slice(en);
  editor.selectionStart = editor.selectionEnd = s + 1;
  if (S.active >= 0) S.files[S.active].content = editor.value;
  updateOverlay();
});

// ================================================================
//  Keyboard shortcuts (global)
// ================================================================
document.addEventListener('keydown', e => {
  const mod = e.ctrlKey || e.metaKey;
  if (!mod) return;
  switch (e.key) {
    // ── File operations ───────────────────────────────────────
    case 's': e.preventDefault();
      if (e.shiftKey) saveFile(S.active, true);
      else            saveFile();
      break;
    case 'n': e.preventDefault(); newFile();  break;
    case 'w': e.preventDefault(); if (S.active >= 0) closeTab(S.active); break;
    case ',': e.preventDefault(); openCfg(); break;
    case 'g': e.preventDefault(); toggleWs(); break;   // ¶ toggle

    // ── Cursor movement (vim-like h/j/k/l) ───────────────────
    // Only active when the editor is focused to avoid conflicts
    case 'h': if (document.activeElement === editor) { e.preventDefault(); moveCursor('left');  } break;
    case 'j': if (document.activeElement === editor) { e.preventDefault(); moveCursor('down');  } break;
    case 'k': if (document.activeElement === editor) { e.preventDefault(); moveCursor('up');    } break;
    case 'l': if (document.activeElement === editor) { e.preventDefault(); moveCursor('right'); } break;
  }
});

// ================================================================
//  Event bindings
// ================================================================
$('btn-open').addEventListener('click',    openDir);
$('btn-open2').addEventListener('click',   openDir);
$('btn-new').addEventListener('click',     newFile);
$('btn-save').addEventListener('click',    () => saveFile());
$('btn-saveas').addEventListener('click',  () => saveFile(S.active, true));
$('btn-vmode').addEventListener('click',   () => setVMode(!S.vm));
$('btn-ws').addEventListener('click',      toggleWs);
$('btn-settings').addEventListener('click', openCfg);
$('btn-refresh').addEventListener('click', buildTree);

$('s-apply').addEventListener('click',  applyCfg);
$('s-cancel').addEventListener('click', () => $('cfg-overlay').classList.remove('open'));
$('cfg-overlay').addEventListener('click', e => {
  if (e.target === $('cfg-overlay')) $('cfg-overlay').classList.remove('open');
});

// ================================================================
//  Init
// ================================================================
loadCfg();
</script>
