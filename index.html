<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>縦書きエディタ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1e1e1e;
      --bg2:      #252526;
      --bg3:      #2d2d2d;
      --border:   #3c3c3c;
      --text:     #d4d4d4;
      --dim:      #858585;
      --accent:   #007acc;
      --accent2:  #1177bb;
      --warn:     #e5c07b;
    }

    body {
      font-family: 'Hiragino Kaku Gothic Pro', 'Yu Gothic UI', 'Meiryo UI',
                   'MS UI Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar ──────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .app-name {
      font-size: 14px; font-weight: 700; color: #fff;
      margin-right: 4px; white-space: nowrap; letter-spacing: 0.03em;
    }
    .sep { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }
    .tbtn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      padding: 4px 10px; border-radius: 4px;
      cursor: pointer; font-size: 12px; white-space: nowrap;
      transition: background 0.12s, border-color 0.12s;
    }
    .tbtn:hover  { background: rgba(255,255,255,0.09); border-color: var(--border); }
    .tbtn.on     { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tbtn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* ── Main layout ──────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── Sidebar ──────────────────────────────── */
    #sidebar {
      width: 230px; min-width: 130px;
      display: flex; flex-direction: column;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      flex-shrink: 0; overflow: hidden;
    }
    #sidebar-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sidebar-title {
      font-size: 11px; font-weight: 700; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.08em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    #tree-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
    .tree-msg { padding: 14px 12px; font-size: 12px; color: var(--dim); line-height: 1.7; }

    /* tree rows */
    .ti {
      display: flex; align-items: center; padding: 3px 0;
      cursor: pointer; white-space: nowrap; user-select: none;
      font-size: 13px; transition: background 0.1s;
    }
    .ti:hover  { background: rgba(255,255,255,0.07); }
    .ti.sel    { background: rgba(0,122,204,0.28); }
    .ti.sel:hover { background: rgba(0,122,204,0.38); }
    .ti-arrow { flex-shrink:0; width:16px; text-align:center; font-size:9px; color:var(--dim); }
    .ti-icon  { flex-shrink:0; margin-right:5px; font-size:13px; }
    .ti-name  { flex:1; overflow:hidden; text-overflow:ellipsis; }

    /* ── Resize handle ────────────────────────── */
    #resizer {
      width: 4px; flex-shrink: 0; cursor: col-resize;
      background: transparent; transition: background 0.2s;
    }
    #resizer:hover, #resizer.active { background: var(--accent); }

    /* ── Editor area ──────────────────────────── */
    #ed-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-width: 0; min-height: 0;
    }

    /* tabs */
    #tabs-bar {
      display: flex; background: var(--bg3);
      border-bottom: 1px solid var(--border);
      overflow-x: auto; flex-shrink: 0; scrollbar-width: thin;
    }
    .tab {
      display: flex; align-items: center;
      height: 32px; padding: 0 12px; font-size: 12px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      border-top: 2px solid transparent;
      white-space: nowrap; color: var(--dim);
      flex-shrink: 0; transition: color 0.12s; max-width: 180px;
    }
    .tab:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active { color: var(--text); background: var(--bg); border-top-color: var(--accent); }
    .tab-name   { overflow:hidden; text-overflow:ellipsis; flex:1; }
    .tab-dot    { color: var(--warn); margin: 0 3px; flex-shrink:0; }
    .tab-x      { flex-shrink:0; margin-left:6px; opacity:0.45; border-radius:3px;
                  padding:1px 3px; font-size:11px; }
    .tab-x:hover { opacity:1; background:rgba(255,255,255,0.18); }

    /* editor wrapper */
    #ed-wrap {
      flex: 1; position: relative;
      overflow: hidden; min-height: 0;
    }

    /* welcome screen */
    #welcome {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; color: var(--dim); text-align: center; padding: 20px;
    }
    #welcome h2 { font-size: 20px; color: var(--text); }
    #welcome p  { font-size: 13px; line-height: 1.7; }
    .wbtn {
      padding: 10px 26px; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
    }
    .wbtn:hover { background: var(--accent2); }

    /* ── TEXTAREA ──────────────────────────────── */
    #editor {
      position: absolute;
      border: none; outline: none; resize: none;
      background: transparent; color: inherit;
      font-size: 16px; line-height: 1.8;
      tab-size: 2; caret-color: var(--accent);
      font-family: inherit;
    }
    #editor.hm {
      writing-mode: horizontal-tb;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      overflow-y: auto; overflow-x: hidden;
      padding: 18px 22px;
    }
    #editor.vm {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      direction: ltr;
      /* The textarea is the sole scroll container in vm mode.
         overflow-x:auto shows one scrollbar (the textarea's own).
         ed-wrap has overflow:hidden so its scrollbar never appears,
         giving exactly one scrollbar total. */
      top: 16px; bottom: 16px; left: 16px; right: 16px;
      overflow-x: auto; overflow-y: hidden; padding: 0 8px;
    }
    #ed-wrap.hm { overflow: hidden; }
    /* vm: ed-wrap never scrolls — all scrolling is via the textarea */
    #ed-wrap.vm { overflow: hidden; }

    /* ── Whitespace overlay ───────────────────── */
    #ws-overlay {
      position: absolute;
      pointer-events: none;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
      /* Base text is transparent — only .ws-* spans are visible */
      color: transparent;
      scrollbar-width: none;
    }
    #ws-overlay::-webkit-scrollbar { display: none; }
    #ws-overlay.hm {
      writing-mode: horizontal-tb;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: auto;
      padding: 18px 22px;
    }
    #ws-overlay.vm {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      direction: ltr;
      overflow: hidden;
      /* pre-wrap matches textarea default so column breaks happen at the same
         height boundary in both elements */
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
      /* Same inset as #editor.vm so the overlay is an exact visual match */
      top: 16px; bottom: 16px; left: 16px; right: 16px;
      padding: 0 8px;
    }

    /* Whitespace marker colours */
    .ws-zen { color: #4db6ff;
              text-decoration: underline;
              text-decoration-color: rgba(77,182,255,0.55);
              text-underline-offset: 2px; }
    .ws-sp  { color: #607898; }
    .ws-nl  { color: #4db6ff; }
    .ws-tab { color: #80b8ff; }
    /* .ws-reg: regular characters — rendered invisible in the overlay */
    .ws-reg { color: transparent; }

    body.light .ws-zen, body.light .ws-nl { color: #1a6bcc; }
    body.light .ws-zen { text-decoration-color: rgba(26,107,204,0.5); }
    body.light .ws-sp  { color: #9aabb8; }
    body.light .ws-tab { color: #4a90cc; }

    body.sepia .ws-zen, body.sepia .ws-nl { color: #8a5a30; }
    body.sepia .ws-zen { text-decoration-color: rgba(138,90,48,0.5); }
    body.sepia .ws-sp  { color: #a09080; }
    body.sepia .ws-tab { color: #7a6a50; }

    /* Vertical-mode newline indicator: zero-height rule at column break */
    /* Uses inline-block with height:0 so it adds NO extra chars to column height */
    .ws-nl-vm {
      display: inline-block;
      height: 0;
      width: 0.65em;
      border-bottom: 1.5px solid rgba(77,182,255,0.85);
      overflow: visible;
    }
    body.light .ws-nl-vm { border-bottom-color: rgba(26,107,204,0.8); }
    body.sepia .ws-nl-vm { border-bottom-color: rgba(138,90,48,0.8); }

    /* ── Cursor-line highlight ─────────────────── */
    #cl-hl {
      position: absolute;
      pointer-events: none;
      display: none;
    }
    /* horizontal mode: underline across the current text row */
    #cl-hl.hm {
      left: 0; right: 0;
      height: 0;
      border-bottom: 2px solid rgba(100, 180, 255, 0.5);
    }
    /* vertical mode: vertical bar at the right of the current column */
    #cl-hl.vm {
      top: 0; bottom: 0;
      width: 0;
      border-left: 2px solid rgba(100, 180, 255, 0.5);
    }

    /* ── Status bar ───────────────────────────── */
    #status {
      display: flex; align-items: center; gap: 14px;
      padding: 3px 12px;
      background: var(--accent); color: #fff;
      font-size: 11px; flex-shrink: 0;
    }
    .si { white-space: nowrap; }
    #si-file { flex:1; overflow:hidden; text-overflow:ellipsis; }

    /* ── Modal overlay ────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 300;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--bg3);
      border: 1px solid #555; border-radius: 10px;
      padding: 28px; width: 520px; max-width: 92vw;
      max-height: 85vh; overflow-y: auto;
    }
    .modal h2 { font-size: 16px; margin-bottom: 22px; color: #fff; }
    .fg  { margin-bottom: 18px; }
    .fl  { display:block; font-size:11px; color:var(--dim); text-transform:uppercase;
           letter-spacing:0.05em; margin-bottom:6px; }
    .fr  { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    select, input[type="number"] {
      background: var(--bg); border: 1px solid #555;
      color: var(--text); padding: 7px 10px;
      border-radius: 5px; font-size: 13px;
    }
    input[type="color"] {
      width: 40px; height: 32px; padding: 2px;
      border: 1px solid #555; border-radius: 5px;
      background: var(--bg); cursor: pointer;
    }
    input[type="checkbox"] { width:15px; height:15px; cursor:pointer; accent-color: var(--accent); }
    select:focus, input:focus { outline: 2px solid var(--accent); }
    .mf  { display:flex; justify-content:flex-end; gap:10px; margin-top:24px; }
    .btn { padding: 7px 20px; border: none; border-radius: 5px; font-size: 13px; cursor: pointer; }
    .btn-p { background: var(--accent); color: #fff; }
    .btn-p:hover { background: var(--accent2); }
    .btn-s { background: #444; color: var(--text); }
    .btn-s:hover { background: #555; }
    .btn-xs { padding: 4px 10px; font-size: 11px; background:#444; color:var(--text);
              border:none; border-radius:4px; cursor:pointer; }
    .btn-xs:hover { background:#555; }

    /* ── Light theme ──────────────────────────── */
    body.light {
      --bg: #ffffff; --bg2: #f0f0f0; --bg3: #e8e8e8;
      --border: #d0d0d0; --text: #1a1a1a; --dim: #606060;
    }
    body.light #editor { caret-color: #007acc; }

    /* ── Sepia theme ──────────────────────────── */
    body.sepia {
      --bg: #f5efe0; --bg2: #ede5d0; --bg3: #e2d9c5;
      --border: #c8b899; --text: #3a2a1e; --dim: #8a7060;
    }
    body.sepia #status { background: #8a6040; }

    /* Scrollbars */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background: #666; }
  </style>
</head>
<body>

<!-- ████ Toolbar ████ -->
<div id="toolbar">
  <span class="app-name">✒️ 縦書きエディタ</span>
  <div class="sep"></div>
  <button class="tbtn" id="btn-open">📂 フォルダを開く</button>
  <button class="tbtn" id="btn-new"    title="新規ファイル (Ctrl+N)">📄 新規</button>
  <button class="tbtn" id="btn-save"   title="上書き保存 (Ctrl+S)">💾 保存</button>
  <button class="tbtn" id="btn-saveas" title="名前を付けて保存 (Ctrl+Shift+S)">📥 名前を付けて保存</button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-vmode"  title="縦書き / 横書きを切り替え">⇅ 縦書き</button>
  <button class="tbtn" id="btn-ws"     title="全角スペース・改行コードを可視化 (Ctrl+G)">¶ 記号表示</button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-settings" title="設定 (Ctrl+,)">⚙ 設定</button>
</div>

<!-- ████ Main ████ -->
<div id="main">

  <!-- ── Sidebar ── -->
  <div id="sidebar">
    <div id="sidebar-head">
      <span id="sidebar-title">エクスプローラー</span>
      <button class="tbtn" id="btn-refresh" title="ツリーを更新"
              style="padding:2px 8px;font-size:11px;margin-left:6px;">↻</button>
    </div>
    <div id="tree-scroll">
      <div class="tree-msg" id="tree-ph">
        フォルダを開いてください<br>
        <small style="color:#555;font-size:11px;">
          ツールバーの「📂 フォルダを開く」から<br>
          ローカルディレクトリを選択します
        </small>
      </div>
    </div>
  </div>

  <!-- ── Resize handle ── -->
  <div id="resizer"></div>

  <!-- ── Editor area ── -->
  <div id="ed-area">
    <div id="tabs-bar"></div>
    <div id="ed-wrap" class="hm">

      <!-- Cursor-line underline (shown when enabled in settings) -->
      <div id="cl-hl" class="hm"></div>

      <!-- Whitespace overlay: shows ↵ ¶ markers; regular chars are transparent -->
      <div id="ws-overlay" class="hm" style="display:none"></div>

      <!-- Welcome screen -->
      <div id="welcome">
        <div style="font-size:58px;line-height:1">✒️</div>
        <h2>縦書きエディタ</h2>
        <p>ローカルフォルダを開いてファイルを編集できます<br>縦書き・横書き切り替え、UTF-8対応</p>
        <button class="wbtn" id="btn-open2">📂 フォルダを開く</button>
        <p style="font-size:11px;margin-top:4px;color:#555">
          ※ Google Chrome / Microsoft Edge が必要です<br>
          （File System Access API を使用します）
        </p>
      </div>

      <!-- The textarea -->
      <textarea id="editor" class="hm"
        style="display:none"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"></textarea>
    </div>
  </div>
</div>

<!-- ████ Status bar ████ -->
<div id="status">
  <span class="si" id="si-mode">横書き</span>
  <span class="si">UTF-8</span>
  <span class="si" id="si-eol">LF</span>
  <span class="si" id="si-pos">1行 1列</span>
  <span class="si" id="si-chars">0 文字</span>
  <span class="si" id="si-file">—</span>
</div>

<!-- ████ Settings modal ████ -->
<div class="overlay" id="cfg-overlay">
  <div class="modal">
    <h2>⚙ 設定</h2>

    <div class="fg">
      <label class="fl">改行コード（デフォルト）</label>
      <select id="s-eol">
        <option value="lf">LF（Unix / macOS）</option>
        <option value="crlf">CRLF（Windows）</option>
        <option value="cr">CR（旧 macOS）</option>
      </select>
    </div>

    <div class="fg">
      <label class="fl">フォントサイズ</label>
      <div class="fr">
        <input type="number" id="s-fsize" value="16" min="8" max="72" style="width:80px"> px
      </div>
    </div>

    <div class="fg">
      <label class="fl">行間</label>
      <div class="fr">
        <input type="number" id="s-lh" value="1.8" min="1.0" max="4.0" step="0.1" style="width:80px">
      </div>
    </div>

    <div class="fg">
      <label class="fl">フォント</label>
      <select id="s-font">
        <option value="mincho">明朝体（游明朝・MS 明朝）</option>
        <option value="gothic">ゴシック体（游ゴシック・メイリオ）</option>
        <option value="mono">等幅（MS ゴシック）</option>
        <option value="momono">等幅明朝体（Osaka-Mono・MS 明朝）</option>
      </select>
    </div>

    <div class="fg">
      <label class="fl">テーマ</label>
      <select id="s-theme">
        <option value="dark">ダーク</option>
        <option value="light">ライト</option>
        <option value="sepia">セピア</option>
      </select>
    </div>

    <div class="fg">
      <label class="fl">背景色（テーマを上書き）</label>
      <div class="fr">
        <input type="color" id="s-bg" value="#1e1e1e">
        <button class="btn-xs" id="s-bg-reset">テーマ色に戻す</button>
        <span id="s-bg-note" style="font-size:11px;color:var(--dim)"></span>
      </div>
    </div>

    <div class="fg">
      <label class="fl">文字色（テーマを上書き）</label>
      <div class="fr">
        <input type="color" id="s-fg" value="#d4d4d4">
        <button class="btn-xs" id="s-fg-reset">テーマ色に戻す</button>
        <span id="s-fg-note" style="font-size:11px;color:var(--dim)"></span>
      </div>
    </div>

    <div class="fg">
      <label class="fl">カーソル行</label>
      <div class="fr">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
          <input type="checkbox" id="s-clhl">
          カーソル行にアンダーラインを表示
        </label>
      </div>
    </div>

    <div class="mf">
      <button class="btn btn-s" id="s-cancel">キャンセル</button>
      <button class="btn btn-p" id="s-apply">適用</button>
    </div>
  </div>
</div>

<!-- ████ Script ████ -->
<script>
'use strict';

// ================================================================
//  Globals
// ================================================================
const $ = id => document.getElementById(id);
const editor     = $('editor');
const tabsBar    = $('tabs-bar');
const treeScroll = $('tree-scroll');
const edWrap     = $('ed-wrap');
const welcome    = $('welcome');

// State
const S = {
  root:   null,
  files:  [],       // FileRec[]
  active: -1,
  vm:     false,    // vertical mode?
  cfg: {
    eol:        'lf',
    fontSize:   16,
    lineHeight: 1.8,
    font:       'mincho',
    theme:      'dark',
    bgColor:    '',   // '' = use theme default
    fgColor:    '',   // '' = use theme default
    cursorLine: false,
    vm:         true,   // default: vertical writing mode
    ws:         false,  // default: whitespace markers off
  }
};

// FileRec: { name, handle (FSAH|null), content, saved, eol, isNew }

let wsVisible = false;   // whitespace overlay on?

// ================================================================
//  IndexedDB – persist FileSystemDirectoryHandle across sessions
// ================================================================
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('tgk_store', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    req.onsuccess       = e => resolve(e.target.result);
    req.onerror         = e => reject(e.target.error);
  });
}
async function idbSet(key, val) {
  try {
    const db = await idbOpen();
    await new Promise((res, rej) => {
      const tx = db.transaction('kv', 'readwrite');
      tx.objectStore('kv').put(val, key);
      tx.oncomplete = res;
      tx.onerror    = e => rej(e.target.error);
    });
  } catch {}
}
async function idbGet(key) {
  try {
    const db = await idbOpen();
    return await new Promise(res => {
      const req = db.transaction('kv', 'readonly').objectStore('kv').get(key);
      req.onsuccess = () => res(req.result ?? null);
      req.onerror   = () => res(null);
    });
  } catch { return null; }
}

// Try to restore the last opened folder on startup
async function tryRestoreLastFolder() {
  const handle = await idbGet('rootHandle');
  if (!handle) return;
  try {
    // queryPermission does NOT require a user gesture
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      S.root = handle;
      $('sidebar-title').textContent = handle.name;
      await buildTree();
    } else {
      // Permission needs re-grant — show a "reopen" button
      showReopenBtn(handle);
    }
  } catch { /* handle is stale, ignore */ }
}

function showReopenBtn(handle) {
  const ph = $('tree-ph');
  if (!ph) return;
  ph.innerHTML =
    `<div class="tree-msg">
       前回開いたフォルダ:<br>
       <strong style="font-size:12px">${handle.name}</strong>
       <div style="margin-top:10px">
         <button class="tbtn" id="btn-reopen" style="font-size:12px;">
           📂 再度開く
         </button>
       </div>
     </div>`;
  $('btn-reopen').addEventListener('click', async () => {
    try {
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        S.root = handle;
        $('sidebar-title').textContent = handle.name;
        await buildTree();
      }
    } catch (e) {
      if (e.name !== 'AbortError')
        alert('フォルダを開けませんでした:\n' + e.message);
    }
  });
}

// ================================================================
//  File-tree
// ================================================================
async function openDir() {
  if (!('showDirectoryPicker' in window)) {
    alert('このブラウザは File System Access API に対応していません。\n' +
          'Google Chrome または Microsoft Edge をご使用ください。');
    return;
  }
  try {
    const h = await window.showDirectoryPicker({ mode: 'readwrite' });
    S.root = h;
    $('sidebar-title').textContent = h.name;
    await idbSet('rootHandle', h);   // persist for next session
    await buildTree();
  } catch (e) {
    if (e.name !== 'AbortError')
      alert('フォルダを開けませんでした:\n' + e.message);
  }
}

async function buildTree() {
  if (!S.root) return;
  treeScroll.innerHTML = '';
  const entries = await readDir(S.root);
  for (const e of entries) treeScroll.appendChild(makeNode(e, 0));
}

async function readDir(dh) {
  const list = [];
  for await (const [name, h] of dh.entries())
    list.push({ name, h, kind: h.kind, expanded: false, loaded: false });
  list.sort((a, b) => {
    if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name, 'ja');
  });
  return list;
}

let selNode = null;

function makeNode(e, depth) {
  const wrap  = document.createElement('div');
  const row   = document.createElement('div');
  row.className = 'ti';
  row.style.paddingLeft = `${8 + depth * 14}px`;

  const arrow  = document.createElement('span');
  arrow.className = 'ti-arrow';
  arrow.textContent = e.kind === 'directory' ? '▶' : ' ';

  const icon   = document.createElement('span');
  icon.className = 'ti-icon';
  icon.textContent = e.kind === 'directory' ? '📁' : fileIcon(e.name);

  const nameEl = document.createElement('span');
  nameEl.className = 'ti-name';
  nameEl.textContent = e.name;

  row.appendChild(arrow);
  row.appendChild(icon);
  row.appendChild(nameEl);
  wrap.appendChild(row);

  if (e.kind === 'directory') {
    const kids = document.createElement('div');
    kids.style.display = 'none';
    wrap.appendChild(kids);

    row.addEventListener('click', async () => {
      if (!e.expanded) {
        if (!e.loaded) {
          e.loaded = true;
          kids.innerHTML = `<div class="tree-msg" style="padding:2px 8px;font-size:11px">読み込み中…</div>`;
          const ch = await readDir(e.h);
          kids.innerHTML = '';
          for (const c of ch) kids.appendChild(makeNode(c, depth + 1));
        }
        e.expanded = true;
        kids.style.display = '';
        arrow.textContent = '▼';
        icon.textContent  = '📂';
      } else {
        e.expanded = false;
        kids.style.display = 'none';
        arrow.textContent = '▶';
        icon.textContent  = '📁';
      }
    });
  } else {
    row.addEventListener('click', async () => {
      if (selNode) selNode.classList.remove('sel');
      selNode = row;
      row.classList.add('sel');
      await openFileHandle(e.h, e.name);
    });
  }
  return wrap;
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ({
    txt:'📄', md:'📝', markdown:'📝',
    js:'🟨', mjs:'🟨', ts:'🔷', jsx:'⚛️', tsx:'⚛️',
    html:'🌐', htm:'🌐', css:'🎨', scss:'🎨', sass:'🎨', less:'🎨',
    json:'📋', yaml:'📋', yml:'📋', toml:'📋', xml:'📋',
    py:'🐍', rb:'💎', java:'☕', go:'🐹',
    c:'⚙️', cpp:'⚙️', h:'⚙️', rs:'🦀',
    sh:'💻', bat:'💻', ps1:'💻',
    png:'🖼️', jpg:'🖼️', jpeg:'🖼️', gif:'🖼️', svg:'🖼️', webp:'🖼️',
    pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗', ppt:'📙', pptx:'📙',
    zip:'📦', tar:'📦', gz:'📦', '7z':'📦',
    mp3:'🎵', wav:'🎵', ogg:'🎵', mp4:'🎬', mov:'🎬',
    log:'📋', csv:'📊', tsv:'📊', sql:'🗄️',
  })[ext] || '📄';
}

// ================================================================
//  File operations
// ================================================================
async function openFileHandle(fh, name) {
  const idx = S.files.findIndex(f => f.handle === fh);
  if (idx >= 0) { switchTab(idx); return; }

  try {
    const file = await fh.getFile();
    if (file.size > 10 * 1024 * 1024) { alert('10 MB を超えるファイルは開けません'); return; }
    let raw;
    try {
      raw = await file.text();
    } catch (readErr) {
      // Dropbox online-only files fail to read with NotReadableError or similar.
      // file.size may be 0 or non-zero but the actual content isn't on disk.
      const isDropboxOnline =
        readErr.name === 'NotReadableError' ||
        (readErr.message && /not readable|cloud|online|placeholder|sparse/i.test(readErr.message));
      if (isDropboxOnline || file.size === 0) {
        alert(
          `"${name}" はクラウド上にのみ存在するため読み込めませんでした。\n\n` +
          `Dropbox でこのファイルを右クリックし、\n` +
          `「オフラインで使用可能にする」を選択してから\n` +
          `再度開いてください。`
        );
      } else {
        alert('ファイルを開けませんでした:\n' + readErr.message);
      }
      return;
    }
    if (/[\x00-\x08\x0b\x0c\x0e-\x1f]/.test(raw.slice(0, 2000))) {
      alert(`"${name}" はバイナリファイルのため開けません`); return;
    }
    const eol     = detectEol(raw);
    const content = normalize(raw);
    S.files.push({ name, handle: fh, content, saved: content, eol, isNew: false });
    renderTabs();
    switchTab(S.files.length - 1);
  } catch (e) {
    alert('ファイルを開けませんでした:\n' + e.message);
  }
}

function newFile() {
  const name = `新規_${Date.now()}.txt`;
  S.files.push({ name, handle: null, content: '', saved: null, eol: S.cfg.eol, isNew: true });
  renderTabs();
  switchTab(S.files.length - 1);
}

async function saveFile(idx = S.active, saveAs = false) {
  if (idx < 0 || idx >= S.files.length) return;
  const f = S.files[idx];
  if (idx === S.active) f.content = editor.value;

  let handle = f.handle;
  if (!handle || saveAs) {
    if (!('showSaveFilePicker' in window)) {
      alert('このブラウザは保存ダイアログに対応していません'); return;
    }
    try {
      handle = await window.showSaveFilePicker({
        suggestedName: f.name,
        types: [
          { description: 'テキストファイル', accept: { 'text/plain': ['.txt','.md','.text'] } },
          { description: 'すべてのファイル', accept: { '*/*': ['.*'] } },
        ]
      });
      f.handle = handle; f.name = handle.name; f.isNew = false;
    } catch (e) {
      if (e.name !== 'AbortError') alert('保存エラー:\n' + e.message);
      return;
    }
  }

  let out = f.content;
  if (f.eol === 'crlf') out = out.replace(/\n/g, '\r\n');
  else if (f.eol === 'cr') out = out.replace(/\n/g, '\r');

  try {
    const w = await handle.createWritable();
    await w.write(new TextEncoder().encode(out));
    await w.close();
    f.saved = f.content;
    renderTabs();
    if (idx === S.active) {
      $('si-file').textContent = f.name;
      $('si-eol').textContent  = f.eol.toUpperCase();
    }
    flashSave();
  } catch (e) {
    alert('保存に失敗しました:\n' + e.message);
  }
}

function closeTab(idx) {
  const f = S.files[idx];
  if (f.content !== f.saved && !confirm(`"${f.name}" の変更を破棄して閉じますか？`)) return;
  S.files.splice(idx, 1);
  const next = S.files.length === 0 ? -1 : Math.min(idx, S.files.length - 1);
  S.active = -1;
  renderTabs();
  switchTab(next);
}

function renderTabs() {
  tabsBar.innerHTML = '';
  S.files.forEach((f, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === S.active ? ' active' : '');

    const nm = document.createElement('span');
    nm.className = 'tab-name'; nm.textContent = f.name; nm.title = f.name;

    const dot = document.createElement('span');
    dot.className = 'tab-dot';
    dot.textContent = (f.content !== f.saved) ? '●' : '';

    const xb = document.createElement('span');
    xb.className = 'tab-x'; xb.textContent = '✕'; xb.title = '閉じる';
    xb.addEventListener('click', ev => { ev.stopPropagation(); closeTab(i); });

    tab.appendChild(nm); tab.appendChild(dot); tab.appendChild(xb);
    tab.addEventListener('click', () => switchTab(i));
    tabsBar.appendChild(tab);
  });
}

function switchTab(idx) {
  if (S.active >= 0 && S.active < S.files.length)
    S.files[S.active].content = editor.value;

  S.active = idx;

  if (idx >= 0 && idx < S.files.length) {
    const f = S.files[idx];
    editor.value = f.content;
    editor.style.display = '';
    welcome.style.display = 'none';
    $('si-file').textContent = f.name;
    $('si-eol').textContent  = f.eol.toUpperCase();
    updateStatus();
    renderTabs();
    updateOverlay();
    updateCursorLine();
    // In vertical mode, scroll to the beginning (rightmost content).
    // scrollLeft = scrollWidth - clientWidth shows the rightmost columns.
    // Use rAF so the layout has been computed with the new content.
    if (S.vm) {
      editor.scrollTop = 0;
      requestAnimationFrame(() => {
        editor.scrollLeft = editor.scrollWidth - editor.clientWidth;
        syncOverlayScroll();
      });
    }
    editor.focus();
  } else {
    editor.style.display = 'none';
    welcome.style.display = '';
    $('si-file').textContent = '—';
    $('ws-overlay').innerHTML = '';
    $('cl-hl').style.display = 'none';
  }
}

// ================================================================
//  Writing mode
// ================================================================
function setVMode(on) {
  S.vm = on;
  const cur = on ? 'vm' : 'hm';
  const prv = on ? 'hm' : 'vm';
  editor.classList.replace(prv, cur);
  edWrap.classList.replace(prv, cur);
  $('btn-vmode').textContent = on ? '↔ 横書き' : '⇅ 縦書き';
  $('btn-vmode').classList.toggle('on', on);
  $('si-mode').textContent = on ? '縦書き' : '横書き';
  syncOverlayClass();
  updateOverlay();
  // Sync cursor-line class too
  const hl = $('cl-hl');
  hl.classList.toggle('hm', !on);
  hl.classList.toggle('vm',  on);
  updateCursorLine();

  if (on) {
    // Scroll to the BEGINNING of the document (= rightmost content in
    // vertical-rl).  scrollLeft=max shows the rightmost (first) columns.
    // We use rAF so the browser has had a chance to lay out the content
    // and compute the correct scrollWidth.
    editor.scrollTop = 0;
    requestAnimationFrame(() => {
      editor.scrollLeft = editor.scrollWidth - editor.clientWidth;
      syncOverlayScroll();
    });
  } else {
    editor.scrollLeft = 0;
    editor.scrollTop  = 0;
  }
  saveCfg();
}

// Convert computed rgb(...) to #rrggbb
function rgbToHex(rgb) {
  const m = rgb.match(/\d+/g);
  if (!m || m.length < 3) return '#000000';
  return '#' + m.slice(0,3).map(n => (+n).toString(16).padStart(2,'0')).join('');
}

function openCfg() {
  const c = S.cfg;
  $('s-eol').value   = c.eol;
  $('s-fsize').value = c.fontSize;
  $('s-lh').value    = c.lineHeight;
  $('s-font').value  = c.font;
  $('s-theme').value = c.theme;
  $('s-clhl').checked = c.cursorLine;

  // Show current effective background / text colors
  if (c.bgColor) {
    $('s-bg').value = c.bgColor;
    $('s-bg-note').textContent = '（カスタム）';
  } else {
    $('s-bg').value = rgbToHex(getComputedStyle(edWrap).backgroundColor || 'rgb(30,30,30)');
    $('s-bg-note').textContent = '（テーマ）';
  }

    $('s-fg').value = c.fgColor;
    $('s-fg-note').textContent = '（カスタム）';
  } else {
    $('s-fg').value = rgbToHex(getComputedStyle(editor).color || 'rgb(212,212,212)');
    $('s-fg-note').textContent = '（テーマ）';
  }

  $('cfg-overlay').classList.add('open');
}

function applyCfg() {
  const c = S.cfg;
  c.eol        = $('s-eol').value;
  c.fontSize   = +$('s-fsize').value;
  c.lineHeight = +$('s-lh').value;
  c.font       = $('s-font').value;
  c.theme      = $('s-theme').value;
  c.cursorLine = $('s-clhl').checked;
  // bgColor / fgColor are written by reset buttons or kept from previous state
  // Only update if note says Custom (user changed the color picker)
  if ($('s-bg-note').textContent === '（カスタム）' || c.bgColor) {
    c.bgColor = $('s-bg').value;
  }
  if ($('s-fg-note').textContent === '（カスタム）' || c.fgColor) {
    c.fgColor = $('s-fg').value;
  }
  applyTheme();
  saveCfg();
  $('cfg-overlay').classList.remove('open');
  $('si-eol').textContent = c.eol.toUpperCase();
}

function applyTheme() {
  const c = S.cfg;
  editor.style.fontSize   = c.fontSize + 'px';
  editor.style.lineHeight = c.lineHeight;
  editor.style.fontFamily = FONTS[c.font];
  document.body.className = c.theme === 'dark' ? '' : c.theme;

  // Custom colors (override theme CSS variables)
  edWrap.style.backgroundColor = c.bgColor || '';
  editor.style.color           = c.fgColor || '';

  syncOverlayFont();
  updateCursorLine();
}

function saveCfg() {
  // Snapshot runtime toggles into cfg before saving
  S.cfg.vm = S.vm;
  S.cfg.ws = wsVisible;
  try { localStorage.setItem('tgk_cfg', JSON.stringify(S.cfg)); } catch {}
}

async function loadCfg() {
  try {
    const s = localStorage.getItem('tgk_cfg');
    if (s) Object.assign(S.cfg, JSON.parse(s));
  } catch {}

  // Capture saved flags BEFORE setVMode/toggleWs call saveCfg and overwrite them
  const savedVm = (S.cfg.vm !== false);   // default true
  const savedWs = !!S.cfg.ws;

  applyTheme();

  // Restore writing mode (default: vertical)
  // Initialize without triggering saveCfg by setting S.vm directly, then calling setVMode
  S.vm = !savedVm;   // force setVMode to actually apply changes
  setVMode(savedVm);

  // Restore whitespace visibility
  if (savedWs) {
    wsVisible = false;   // ensure toggleWs goes → true
    toggleWs();
  }

  // Restore last opened folder (async, no user gesture needed if permission persists)
  await tryRestoreLastFolder();
}

// ================================================================
//  Whitespace overlay
// ================================================================
function toggleWs() {
  wsVisible = !wsVisible;
  const ov = $('ws-overlay');
  if (wsVisible) {
    ov.style.display = '';
    syncOverlayClass();
    syncOverlayFont();
    updateOverlay();
  } else {
    ov.style.display = 'none';
    ov.innerHTML = '';
  }
  $('btn-ws').classList.toggle('on', wsVisible);
  saveCfg();
}

function updateOverlay() {
  if (!wsVisible) return;
  const ov   = $('ws-overlay');
  const text = editor.value;
  let html   = '';
  let reg    = '';   // buffer for regular (transparent) chars

  function flushReg() {
    if (reg) { html += '<span class="ws-reg">' + reg + '</span>'; reg = ''; }
  }

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    switch (ch) {
      case '\u3000':  // 全角スペース
        flushReg();
        html += '<span class="ws-zen">\u3000</span>'; break;
      case ' ':       // 半角スペース → middle dot
        flushReg();
        html += '<span class="ws-sp">\u00B7</span>'; break;
      case '\t':      // タブ → →
        flushReg();
        html += '<span class="ws-tab">\u2192</span>\t'; break;
      case '\n':      // 改行
        flushReg();
        // In vertical mode, adding a character symbol before \n would shift all
        // subsequent characters in the column down by 1 unit, causing misalignment.
        // Use a zero-height border indicator instead (adds no column height).
        html += S.vm
          ? '<span class="ws-nl-vm"></span>\n'
          : '<span class="ws-nl">\u21B5</span>\n';
        break;
      case '&': reg += '&amp;'; break;
      case '<': reg += '&lt;';  break;
      case '>': reg += '&gt;';  break;
      default:  reg += ch;
    }
  }
  flushReg();
  ov.innerHTML = html;
  syncOverlayScroll();
}

// Sync overlay scroll position with the textarea (both hm and vm modes).
// In vm mode the overlay is a fixed-size overflow:hidden box — its scrollLeft
// must be kept in sync with the textarea's scrollLeft manually.
function syncOverlayScroll() {
  if (!wsVisible) return;
  const ov = $('ws-overlay');
  ov.scrollTop  = editor.scrollTop;
  ov.scrollLeft = editor.scrollLeft;
}

function syncOverlayClass() {
  const ov = $('ws-overlay');
  ov.classList.toggle('hm', !S.vm);
  ov.classList.toggle('vm',  S.vm);
}

function syncOverlayFont() {
  if (!wsVisible) return;
  const ov = $('ws-overlay');
  ov.style.fontSize   = editor.style.fontSize   || '16px';
  ov.style.lineHeight = editor.style.lineHeight || '1.8';
  ov.style.fontFamily = editor.style.fontFamily || 'inherit';
}

// ================================================================
//  Cursor-line highlight
// ================================================================
function updateCursorLine() {
  const hl = $('cl-hl');
  if (!S.cfg.cursorLine || S.active < 0 || editor.style.display === 'none') {
    hl.style.display = 'none';
    return;
  }

  const pos   = editor.selectionStart;
  const text  = editor.value;
  const lines = text.split('\n');
  let lineIdx = 0, lineStart = 0;
  for (let i = 0; i < lines.length; i++) {
    if (pos >= lineStart && pos <= lineStart + lines[i].length) { lineIdx = i; break; }
    lineStart += lines[i].length + 1;
  }

  const fs = parseFloat(editor.style.fontSize)   || S.cfg.fontSize;
  const lh = parseFloat(editor.style.lineHeight) || S.cfg.lineHeight;
  const lineH = fs * lh;

  if (S.vm) {
    // In vertical mode: each buffer line = one column
    // First column (lineIdx=0) sits at right:16px; each column is ~lineH px wide
    const rightPos = 16 + lineIdx * lineH;
    hl.className = 'vm';
    hl.style.top    = '16px';
    hl.style.bottom = '16px';
    hl.style.right  = rightPos + 'px';
    hl.style.left   = 'auto';
    hl.style.height = 'auto';
    hl.style.width  = '0';
  } else {
    // In horizontal mode: underline at the bottom of the current line
    const pad = 18;  // padding-top from CSS
    const top = pad + (lineIdx + 1) * lineH - 2;
    hl.className = 'hm';
    hl.style.top    = top + 'px';
    hl.style.bottom = 'auto';
    hl.style.left   = '22px';
    hl.style.right  = '22px';
    hl.style.height = '0';
    hl.style.width  = 'auto';
  }
  hl.style.display = '';
}

// ================================================================
//  Cursor movement  (Ctrl+H/J/K/L)
//
//  Horizontal mode:  H=left  J=down  K=up  L=right
//  Vertical mode:    H=down  J=right K=left L=up
//  (In vertical-rl, "left/right" means next/prev column which
//   maps to next/prev buffer-line; "up/down" maps to ±1 char)
// ================================================================
function moveCursor(dir) {
  const pos  = editor.selectionStart;
  const text = editor.value;
  let newPos = pos;

  if (dir === 'left') {
    // Move backward 1 char; STOP at the start of the current line (don't cross \n)
    if (pos > 0 && text[pos - 1] !== '\n') newPos = pos - 1;

  } else if (dir === 'right') {
    // Move forward 1 char; STOP at the end of the current line (don't cross \n)
    if (pos < text.length && text[pos] !== '\n') newPos = pos + 1;

  } else {
    // Line-based movement (up / down)
    const lines = text.split('\n');
    let lineIdx = 0, lineStart = 0;
    for (let i = 0; i < lines.length; i++) {
      if (pos >= lineStart && pos <= lineStart + lines[i].length) { lineIdx = i; break; }
      lineStart += lines[i].length + 1;
    }
    const col = pos - lineStart;

    if (dir === 'up' && lineIdx > 0) {
      let prevStart = 0;
      for (let i = 0; i < lineIdx - 1; i++) prevStart += lines[i].length + 1;
      newPos = prevStart + Math.min(col, lines[lineIdx - 1].length);

    } else if (dir === 'down' && lineIdx < lines.length - 1) {
      let nextStart = 0;
      for (let i = 0; i <= lineIdx; i++) nextStart += lines[i].length + 1;
      newPos = nextStart + Math.min(col, lines[lineIdx + 1].length);
    }
    // At first/last line → no movement
  }

  editor.selectionStart = editor.selectionEnd = newPos;
  editor.focus();
  updateStatus();
  updateCursorLine();
}

// ================================================================
//  Helpers
// ================================================================
function detectEol(t) {
  if (t.includes('\r\n')) return 'crlf';
  if (t.includes('\r'))   return 'cr';
  return 'lf';
}
function normalize(t) {
  return t.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
}
function updateStatus() {
  const val  = editor.value;
  const pos  = editor.selectionStart;
  const lines = val.split('\n');
  let ln = 1, col = 1, sum = 0;
  for (const line of lines) {
    if (sum + line.length >= pos) { col = pos - sum + 1; break; }
    sum += line.length + 1;
    ln++;
  }
  $('si-pos').textContent   = `${ln}行 ${col}列`;
  $('si-chars').textContent = val.length + ' 文字';
}
function flashSave() {
  const b = $('btn-save');
  const t = b.textContent;
  b.textContent = '✅ 保存完了';
  b.classList.add('on');
  setTimeout(() => { b.textContent = t; b.classList.remove('on'); }, 1600);
}

const rz  = $('resizer');
const sb  = $('sidebar');
let rzing = false;

rz.addEventListener('mousedown', () => {
  rzing = true;
  rz.classList.add('active');
  document.body.style.cursor     = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!rzing) return;
  sb.style.width = Math.max(130, Math.min(500, e.clientX)) + 'px';
});
document.addEventListener('mouseup', () => {
  if (!rzing) return;
  rzing = false;
  rz.classList.remove('active');
  document.body.style.cursor     = '';
  document.body.style.userSelect = '';
});

// ================================================================
//  Mouse-wheel scroll for vertical mode
//
//  Architecture: #ed-wrap.vm has overflow:hidden (no scrollbar).
//  The textarea (#editor) is the only scroll container.
//  Its scrollLeft controls which columns are visible.
//
//  In writing-mode:vertical-rl with direction:ltr:
//    • scrollLeft = 0    → leftmost content = END of document
//    • scrollLeft = max  → rightmost content = BEGINNING of document
//  (vertical-rl lays out the first column on the RIGHT)
//
//  So: wheel-down (positive deltaY) → go forward → show later columns
//      → move left → DECREASE scrollLeft
// ================================================================
function onVmWheel(e) {
  if (!S.vm) return;
  e.preventDefault();

  // Normalise deltaY to pixels (deltaMode 0=px, 1=line, 2=page)
  let delta = e.deltaY;
  if (e.deltaMode === 1) delta *= 24;
  if (e.deltaMode === 2) delta *= 400;

  // Decrease scrollLeft to go forward (toward the left = toward end)
  editor.scrollLeft -= delta;
  syncOverlayScroll();
}
edWrap.addEventListener('wheel', onVmWheel, { passive: false });

// ================================================================
//  Editor events
// ================================================================
editor.addEventListener('input', () => {
  if (S.active >= 0) {
    S.files[S.active].content = editor.value;
    renderTabs();
    updateStatus();
  }
  updateOverlay();
  updateCursorLine();
});

editor.addEventListener('scroll', syncOverlayScroll);

editor.addEventListener('keyup',  () => { updateStatus(); updateCursorLine(); });
editor.addEventListener('click',  () => { updateStatus(); updateCursorLine(); });
editor.addEventListener('focus',  () => { updateStatus(); updateCursorLine(); });
editor.addEventListener('select', updateStatus);

// Tab key: insert \t
editor.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const s = editor.selectionStart, en = editor.selectionEnd;
  editor.value = editor.value.slice(0, s) + '\t' + editor.value.slice(en);
  editor.selectionStart = editor.selectionEnd = s + 1;
  if (S.active >= 0) S.files[S.active].content = editor.value;
  updateOverlay();
});

// ================================================================
//  Keyboard shortcuts (global)
// ================================================================
document.addEventListener('keydown', e => {
  const mod = e.ctrlKey || e.metaKey;
  if (!mod) return;

  switch (e.key) {
    // ── File / UI operations ──────────────────────────────────
    case 's':
      e.preventDefault();
      e.shiftKey ? saveFile(S.active, true) : saveFile();
      break;
    case 'n': e.preventDefault(); newFile();  break;
    case 'w': e.preventDefault(); if (S.active >= 0) closeTab(S.active); break;
    case ',': e.preventDefault(); openCfg(); break;
    case 'g': e.preventDefault(); toggleWs(); break;  // ¶ toggle

    // ── Cursor movement: Ctrl+H/J/K/L ────────────────────────
    // Only fires when the editor textarea is focused.
    //
    // Horizontal mode:  H = left(-1)   J = down(nextLine)
    //                   K = up(prevLine) L = right(+1)
    //
    // Vertical-rl mode: visual directions differ from buffer:
    //   H (visual-left)  = next buffer line  → 'down'
    //   J (visual-down)  = +1 char           → 'right'
    //   K (visual-up)    = −1 char           → 'left'
    //   L (visual-right) = prev buffer line  → 'up'
    case 'h':
      if (document.activeElement === editor) {
        e.preventDefault();
        moveCursor(S.vm ? 'down'  : 'left');
      }
      break;
    case 'j':
      if (document.activeElement === editor) {
        e.preventDefault();
        moveCursor(S.vm ? 'right' : 'down');
      }
      break;
    case 'k':
      if (document.activeElement === editor) {
        e.preventDefault();
        moveCursor(S.vm ? 'left'  : 'up');
      }
      break;
    case 'l':
      if (document.activeElement === editor) {
        e.preventDefault();
        moveCursor(S.vm ? 'up'    : 'right');
      }
      break;
  }
});

// ================================================================
//  Event bindings
// ================================================================
$('btn-open').addEventListener('click',    openDir);
$('btn-open2').addEventListener('click',   openDir);
$('btn-new').addEventListener('click',     newFile);
$('btn-save').addEventListener('click',    () => saveFile());
$('btn-saveas').addEventListener('click',  () => saveFile(S.active, true));
$('btn-vmode').addEventListener('click',   () => setVMode(!S.vm));
$('btn-ws').addEventListener('click',      toggleWs);
$('btn-settings').addEventListener('click', openCfg);
$('btn-refresh').addEventListener('click', buildTree);

$('s-apply').addEventListener('click',  applyCfg);
$('s-cancel').addEventListener('click', () => $('cfg-overlay').classList.remove('open'));
$('cfg-overlay').addEventListener('click', e => {
  if (e.target === $('cfg-overlay')) $('cfg-overlay').classList.remove('open');
});

// Color picker: mark as custom when the user changes the value
$('s-bg').addEventListener('input', () => { $('s-bg-note').textContent = '（カスタム）'; });
$('s-fg').addEventListener('input', () => { $('s-fg-note').textContent = '（カスタム）'; });

// Reset color to theme default
$('s-bg-reset').addEventListener('click', () => {
  S.cfg.bgColor = '';
  edWrap.style.backgroundColor = '';
  $('s-bg').value = rgbToHex(getComputedStyle(edWrap).backgroundColor || 'rgb(30,30,30)');
  $('s-bg-note').textContent = '（テーマ）';
  saveCfg();
});
$('s-fg-reset').addEventListener('click', () => {
  S.cfg.fgColor = '';
  editor.style.color = '';
  $('s-fg').value = rgbToHex(getComputedStyle(editor).color || 'rgb(212,212,212)');
  $('s-fg-note').textContent = '（テーマ）';
  saveCfg();
});

// ================================================================
//  Init
// ================================================================
loadCfg();
</script>
